<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Federation Watchtower</title><link rel="stylesheet" href="tokens.css"><style>html,body{margin:0;min-height:100%;background:#171718}body{display:grid;place-items:center;color:var(--fed-paper);font-family:system-ui,sans-serif}.splash{width:min(760px,calc(100% - 32px));padding:34px;border:2px solid var(--fed-paper);background:var(--fed-surface);box-shadow:8px 8px 0 #000;position:relative;overflow:hidden}.splash:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 12% 20%,#f4c842 0 1px,transparent 2px),radial-gradient(circle at 82% 65%,#5ec5c2 0 1px,transparent 2px);background-size:18px 18px,24px 24px;opacity:.16;pointer-events:none}.splash__row{display:flex;align-items:center;gap:24px;position:relative}.splash img{width:124px;height:124px}.splash h1{margin:0;font-family:var(--fed-display);font-size:clamp(2.3rem,7vw,5rem);line-height:.9;letter-spacing:.025em;text-transform:uppercase}.splash p{font-family:var(--fed-mono);color:#b8d8d4;max-width:48ch;line-height:1.6}.splash__bar{height:12px;margin-top:30px;background:var(--fed-ink);border:2px solid var(--fed-paper);position:relative}.splash__bar i{display:block;width:68%;height:100%;background:var(--fed-highlight);animation:load 2.4s steps(8,end) infinite}.splash__caption{margin-top:10px;font:12px var(--fed-mono);color:var(--fed-highlight)}@keyframes load{0%{width:8%}70%{width:80%}100%{width:96%}}@media(max-width:560px){.splash{padding:22px}.splash__row{align-items:flex-start;gap:14px}.splash img{width:76px;height:76px}}@media(prefers-reduced-motion:reduce){.splash__bar i{animation:none;width:72%}}</style></head><body><main class="splash federation-brand federation-brand--watchtower"><div class="splash__row"><img src="federation-f-mark.svg" alt="Federation F-signal"><div><h1>Federation<br><span class="fed-signal">Watchtower</span></h1><p>PUBLIC PACKETS. PRIVATE CHAOS.<br>Initializing the agent broadcast…</p></div></div><div class="splash__bar" aria-label="Loading"><i></i></div><div class="splash__caption">SIGNAL / F-001 / STANDBY</div></main></body></html>
