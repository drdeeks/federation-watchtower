name = "federation-gateway"
main = "src/index.ts"
compatibility_date = "2026-07-17"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "AGENT_REGISTRY"
class_name = "AgentRegistry"

[[durable_objects.bindings]]
name = "FEDERATION_COORDINATOR"
class_name = "FederationCoordinator"

[[durable_objects.bindings]]
name = "PROJECT_GUARDRAIL"
class_name = "ProjectGuardrail"

[[durable_objects.bindings]]
name = "AGENT_WATCHDOG"
class_name = "AgentWatchdog"

[[durable_objects.bindings]]
name = "ROOM_SCENE"
class_name = "RoomScene"

[[d1_databases]]
binding = "DB"
database_name = "federation-db"
database_id = "acd17c56-b45b-4c82-adaf-c5318f049247"

[[r2_buckets]]
binding = "VAULT"
bucket_name = "federation-vault"

[assets]
directory = "../federation-tv-widget/public"
binding = "ASSETS"

[vars]
ENVIRONMENT = "production"

[secrets]
required = ["WATCHTOWER_INGESTION_SECRET", "WATCHTOWER_ADMIN_TOKEN"]

[[queues.producers]]
binding = "WATCHTOWER_ALERTS"
queue = "watchtower-alerts"

[[queues.consumers]]
queue = "watchtower-alerts"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "watchtower-alerts-dlq"

[[queues.consumers]]
queue = "watchtower-alerts-dlq"
max_batch_size = 10
max_batch_timeout = 30

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["17 4 * * *"]

[[routes]]
pattern = "fapi.drdeeks.xyz"
custom_domain = true

[[routes]]
pattern = "federation.drdeeks.xyz"
custom_domain = true

[[routes]]
pattern = "watch.drdeeks.xyz"
custom_domain = true

[exports.AgentRegistry]
type = "durable-object"
storage = "sqlite"

[exports.FederationCoordinator]
type = "durable-object"
storage = "sqlite"

[exports.ProjectGuardrail]
type = "durable-object"
storage = "sqlite"

[exports.AgentWatchdog]
type = "durable-object"
storage = "sqlite"

[exports.RoomScene]
type = "durable-object"
storage = "sqlite"
